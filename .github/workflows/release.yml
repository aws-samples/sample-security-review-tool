name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version
        id: version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - uses: oven-sh/setup-bun@v2

      - name: Build CLI binaries
        run: |
          npm run build:cli:linux-x64:prod
          npm run build:cli:linux-arm64:prod
          npm run build:cli:osx-x64:prod
          npm run build:cli:osx-arm64:prod
          npm run build:cli:win-x64:prod

      - name: Set permissions
        run: |
          chmod +x build/linux-x64/srt
          chmod +x build/linux-arm64/srt
          chmod +x build/osx-x64/srt
          chmod +x build/osx-arm64/srt

      - name: Create archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf "srt-cli-${VERSION}-linux-x64.tar.gz" -C build/linux-x64 srt
          tar -czf "srt-cli-${VERSION}-linux-arm64.tar.gz" -C build/linux-arm64 srt
          tar -czf "srt-cli-${VERSION}-macos-x64.tar.gz" -C build/osx-x64 srt
          tar -czf "srt-cli-${VERSION}-macos-arm64.tar.gz" -C build/osx-arm64 srt
          cd build/win-x64 && zip "../../srt-cli-${VERSION}-windows-x64.zip" srt.exe

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "SRT ${{ steps.version.outputs.version }}" \
            --generate-notes \
            srt-cli-*.tar.gz \
            srt-cli-*.zip
