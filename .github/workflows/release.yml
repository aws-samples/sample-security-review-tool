name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version is not already tagged
        run: |
          if git tag -l | grep -qx "${{ steps.version.outputs.version }}"; then
            echo "::error::Tag ${{ steps.version.outputs.version }} already exists. Bump the version in package.json before merging."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: oven-sh/setup-bun@v2

      - name: Build CLI - Linux x64
        run: npm run build:cli:linux-x64:prod

      - name: Build CLI - macOS x64
        run: npm run build:cli:osx-x64:prod

      - name: Build CLI - macOS ARM64
        run: npm run build:cli:osx-arm64:prod

      - name: Build CLI - Windows x64
        run: npm run build:cli:win-x64:prod

      - name: Set execute permissions
        run: |
          chmod +x build/linux-x64/srt
          chmod +x build/osx-x64/srt
          chmod +x build/osx-arm64/srt

      - name: Create archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf "srt-cli-${VERSION}-linux-x64.tar.gz" -C build/linux-x64 srt
          tar -czf "srt-cli-${VERSION}-macos-x64.tar.gz" -C build/osx-x64 srt
          tar -czf "srt-cli-${VERSION}-macos-arm64.tar.gz" -C build/osx-arm64 srt
          cd build/win-x64 && zip "../../srt-cli-${VERSION}-windows-x64.zip" srt.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: SRT ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            srt-cli-*.tar.gz
            srt-cli-*.zip
