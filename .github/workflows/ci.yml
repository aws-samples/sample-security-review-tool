name: CI

on:
  workflow_call:
    inputs:
      upload-coverage:
        description: "Upload coverage artifacts for PR comments"
        required: false
        default: false
        type: boolean

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: inputs.upload-coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
